version: "3.9"

services:
  api:
    build: .
    container_name: gymos_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # Point the app at the replica-set-aware connection string
      - MONGO_URI=mongodb://mongo:27017/gymos?replicaSet=rs0
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongo:
    image: mongo:7
    container_name: gymos_mongo
    restart: unless-stopped
    # Start as a single-node replica set so Mongo transactions work
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      # Auto-initiate the replica set on first boot; do nothing if already running
      test: >
        mongosh --quiet --eval
        "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}).ok }"
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 10s

volumes:
  mongo_data:
